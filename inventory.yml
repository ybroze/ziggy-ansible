---
all:
  children:
    openclaw_servers:
      hosts:
        ziggy-vm:
          ansible_host: 34.30.22.217
          ansible_user: yuri
          ansible_become: true
  vars:
    # OpenClaw base
    openclaw_user: openclaw
    openclaw_home: /home/openclaw
    openclaw_install_mode: release
    tailscale_enabled: false

    # Ziggy extensions
    caddy_domain: ziggy.broze.net
    caddy_webroot: /var/www/ziggy.broze.net
    signal_cli_version: "0.13.24"
    java_package: openjdk-21-jre-headless
    chrome_install: true

    # Workspace git
    workspace_git_remote: "git@github.com:ybroze/ziggy-bot.git"

    # UFW extra ports (beyond base SSH + Tailscale)
    extra_ufw_ports:
      - { port: '80', proto: 'tcp', comment: 'HTTP (Caddy)' }
      - { port: '443', proto: 'tcp', comment: 'HTTPS (Caddy)' }
