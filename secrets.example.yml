---
# Ziggy VM Secrets
# Copy to ~/Secrets/ziggy-ansible-secrets.yml and fill in values.
# Pass at runtime: --extra-vars @~/Secrets/ziggy-ansible-secrets.yml
# NEVER commit the filled-in version.

# --- OpenClaw Core ---
anthropic_api_key: "sk-ant-..."
openclaw_gateway_token: ""
brave_search_api_key: "BSA..."

# --- Channels ---
telegram_bot_token: ""
telegram_allow_from:
  - REDACTED_TELEGRAM_ID
signal_allow_from:
  - "REDACTED_PHONE_1"
  - "username:REDACTED_USERNAME"
  - "REDACTED_PHONE_2"
  - "REDACTED_PHONE_3"
  - "REDACTED_PHONE_4"
  - "REDACTED_PHONE_5"
  - "REDACTED_PHONE_6"
  - "REDACTED_PHONE_7"

# --- GitHub ---
agent_github_pat: "ghp_..."
agent_ssh_private_key: |
  -----BEGIN OPENSSH PRIVATE KEY-----
  ...
  -----END OPENSSH PRIVATE KEY-----
agent_ssh_public_key: "ssh-ed25519 AAAA..."

# --- Twilio ---
twilio_sid: "AC..."
twilio_auth_token: ""
twilio_number: "REDACTED_PHONE_8"

# --- Google OAuth ---
# Export from VM: cat ~/.config/ziggy/google-credentials.json
# agent_google_credentials: { ... }
# Export from VM: cat ~/.config/ziggy/google-tokens.json
# agent_google_tokens: { ... }
