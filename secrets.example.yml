---
# Ziggy VM Secrets
# Copy to ~/Secrets/ziggy-ansible-secrets.yml and fill in values.
# Pass at runtime: --extra-vars @~/Secrets/ziggy-ansible-secrets.yml
# NEVER commit the filled-in version.

# GitHub
ziggy_github_pat: ""
# ziggy_ssh_private_key: |
#   -----BEGIN OPENSSH PRIVATE KEY-----
#   ...
#   -----END OPENSSH PRIVATE KEY-----
# ziggy_ssh_public_key: "ssh-ed25519 AAAA..."

# Twilio
twilio_sid: ""
twilio_auth_token: ""
twilio_number: "REDACTED_PHONE_8"

# Google OAuth (export from ~/.config/ziggy/ on the VM)
# ziggy_google_credentials: { ... }
# ziggy_google_tokens: { ... }

# API Keys (for reference — these go in openclaw.json, not deployed by Ansible yet)
# anthropic_api_key: ""
# brave_search_api_key: ""
# telegram_bot_token: ""
