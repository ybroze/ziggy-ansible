---
# Agent Deployment Secrets
# Store locally (e.g., ~/Secrets/agent-secrets.yml)
# Usage: --extra-vars @~/Secrets/agent-secrets.yml
# NEVER commit the filled-in version.

# --- Server ---
server_ip: ""
server_user: ""
agent_domain: "agent.yourdomain.com"

# --- Anthropic ---
anthropic_api_key: "sk-ant-..."
openclaw_gateway_token: ""

# --- Brave Search ---
brave_search_api_key: ""

# --- Channels ---
signal_account: "+1YOURTWILINUMBER"
telegram_bot_token: ""
telegram_allow_from:
  - 0
signal_allow_from:
  - "+1YOURNUMBER"

# --- GitHub ---
agent_github_pat: "ghp_..."
agent_ssh_private_key: |
  -----BEGIN OPENSSH PRIVATE KEY-----
  ...
  -----END OPENSSH PRIVATE KEY-----
agent_ssh_public_key: "ssh-ed25519 AAAA..."

# --- Twilio ---
twilio_sid: "AC..."
twilio_auth_token: ""
twilio_number: "+1YOURTWILINUMBER"

# --- Google Workspace ---
google_login: "agent@yourdomain.com"
google_password: ""

# --- Git Identity ---
agent_git_name: "YourAgentName"
agent_git_email: "agent@yourdomain.com"

# --- Google Workspace ---
google_login: "agent@yourdomain.com"
google_password: ""

# --- Workspace ---
workspace_git_remote: "git@github.com:you/your-workspace.git"
