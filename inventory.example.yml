---
# Copy to inventory.yml and customize for your environment.
# Host-specific values (IP, SSH user) can be passed via --extra-vars
# from your secrets file if you prefer not to store them here.
all:
  children:
    agent_servers:
      hosts:
        my-agent:
          ansible_host: "{{ server_ip }}"
          ansible_user: "{{ server_user | default('root') }}"
          ansible_become: true
  vars:
    # Agent identity
    agent_user: openclaw
    agent_home: /home/openclaw
    # agent_name: ziggy

    # Extensions
    caddy_domain: "{{ agent_domain | default('') }}"
    signal_cli_version: "0.13.24"
    java_package: openjdk-21-jre-headless

    # Workspace git — set workspace_git_remote in your secrets file
    # workspace_git_remote: "git@github.com:you/your-workspace.git"
