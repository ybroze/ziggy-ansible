---
# Ziggy VM - Full provisioning
# Runs the base OpenClaw playbook + Ziggy-specific extensions
#
# Usage from your laptop:
#   ansible-playbook playbooks/agent.yml -i inventory.yml \
#     --ask-become-pass \
#     --extra-vars @~/Secrets/ziggy-ansible-secrets.yml

- name: Base OpenClaw installation
  ansible.builtin.import_playbook: deploy.yml

- name: Ziggy extensions
  hosts: openclaw_servers
  become: true
  vars:
    ansible_python_interpreter: /usr/bin/python3

  roles:
    - chrome
    - caddy
    - signal_cli
    - agent_config
    - openclaw_config
