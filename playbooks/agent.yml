---
# Agent VM — Full provisioning
#
# Usage:
#   ansible-playbook playbooks/agent.yml -i inventory.yml \
#     --ask-become-pass \
#     --extra-vars @secrets.yml

- name: Validate required variables
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Verify secrets file was provided
      ansible.builtin.assert:
        that:
          - server_ip is defined
          - server_ip | length > 0
          - anthropic_api_key is defined
          - anthropic_api_key | length > 0
        fail_msg: >-
          Missing required variables. Did you pass your secrets file?
          Usage: ansible-playbook playbooks/agent.yml -i inventory.yml
          --extra-vars @secrets.yml

- name: Provision agent VM
  hosts: agent_servers
  become: true

  vars:
    ansible_python_interpreter: /usr/bin/python3
    # Map generic names to openclaw submodule expectations
    openclaw_user: "{{ agent_user }}"
    openclaw_home: "{{ agent_home }}"

  environment:
    TERM: xterm-256color
    COLORTERM: truecolor

  pre_tasks:
    - name: Update apt cache and upgrade packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600
      when: not ci_test | default(false)

  roles:
    # Base
    - common

    # Backend (from vendor/openclaw-ansible)
    - openclaw

    # Infrastructure
    - chrome
    - caddy
    - signal_cli

    # Agent
    - credentials
    - workspace
    - openclaw_config
