---
- name: Install OpenClaw with Docker and UFW firewall
  hosts: localhost
  connection: local
  become: true

  vars:
    ansible_python_interpreter: /usr/bin/python3

  environment:
    TERM: xterm-256color
    COLORTERM: truecolor

  pre_tasks:
    - name: Update apt cache and upgrade all packages (Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600
      when: not ci_test
      register: apt_upgrade_result

    - name: Display apt upgrade results
      ansible.builtin.debug:
        msg: "✅ System packages updated and upgraded"
      when: not ci_test and apt_upgrade_result.changed | default(false)

  roles:
    - common
    - openclaw

  post_tasks:
    - name: Display completion status
      ansible.builtin.debug:
        msg: "Installation complete. Run: sudo su - {{ openclaw_user }} && openclaw onboard --install-daemon"
