---
- name: Install Java runtime
  ansible.builtin.apt:
    name: "{{ java_package }}"
    state: present
    update_cache: true

- name: Check if signal-cli is already installed at target version
  ansible.builtin.stat:
    path: "/opt/signal-cli-{{ signal_cli_version }}"
  register: signal_cli_dir

- name: Download signal-cli
  ansible.builtin.get_url:
    url: "https://github.com/AsamK/signal-cli/releases/download/v{{ signal_cli_version }}/signal-cli-{{ signal_cli_version }}.tar.gz"
    dest: "/tmp/signal-cli-{{ signal_cli_version }}.tar.gz"
    mode: '0644'
  when: not signal_cli_dir.stat.exists

- name: Extract signal-cli
  ansible.builtin.unarchive:
    src: "/tmp/signal-cli-{{ signal_cli_version }}.tar.gz"
    dest: /opt
    remote_src: true
  when: not signal_cli_dir.stat.exists

- name: Create signal-cli symlink
  ansible.builtin.file:
    src: "/opt/signal-cli-{{ signal_cli_version }}/bin/signal-cli"
    dest: /usr/local/bin/signal-cli
    state: link
    force: true

- name: Create signal-cli data directory
  ansible.builtin.file:
    path: "{{ openclaw_home }}/.local/share/signal-cli"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0700'

- name: Verify signal-cli is working
  ansible.builtin.command: signal-cli --version
  changed_when: false

- name: Check if signal-cli JSON-RPC is reachable
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ signal_jsonrpc_port }}"
    timeout: 3
  register: signal_rpc_check
  failed_when: false
  when: signal_account is defined

- name: Configure Signal read receipts and delivery indicators
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ signal_jsonrpc_port }}/api/v1/rpc"
    method: POST
    body_format: json
    body:
      jsonrpc: "2.0"
      method: updateConfiguration
      params:
        account: "{{ signal_account }}"
        readReceipts: true
        unidentifiedDeliveryIndicators: true
      id: 1
    status_code: 200
  become: true
  become_user: "{{ openclaw_user }}"
  changed_when: false
  when:
    - signal_account is defined
    - signal_rpc_check.port is defined

# NOTE: Signal account registration is stateful and cannot be automated.
# The signal-cli data directory (~/.local/share/signal-cli) must be
# backed up and restored manually. Registration involves:
# 1. signal-cli -u +NUMBER register (or link)
# 2. signal-cli -u +NUMBER verify CODE
# These steps require interactive Twilio/phone access.
