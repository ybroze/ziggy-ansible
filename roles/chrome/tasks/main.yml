---
- name: Check if Chrome is already installed
  ansible.builtin.command: google-chrome-stable --version
  register: chrome_installed
  changed_when: false
  failed_when: false

- name: Download Google Chrome stable
  ansible.builtin.get_url:
    url: "https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb"
    dest: /tmp/google-chrome-stable_current_amd64.deb
    mode: '0644'
  when: chrome_installed.rc != 0

- name: Install Google Chrome stable
  ansible.builtin.apt:
    deb: /tmp/google-chrome-stable_current_amd64.deb
    state: present
  register: chrome_install_result
  when: chrome_installed.rc != 0

- name: Fix broken dependencies after Chrome install
  ansible.builtin.apt:
    state: fixed
  when: chrome_installed.rc != 0 and chrome_install_result is changed
