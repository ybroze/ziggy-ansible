---
# Deploy OpenClaw backend configuration

- name: Restrict state directory permissions
  ansible.builtin.file:
    path: "{{ openclaw_home }}/.openclaw"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0700'

- name: Create systemd user override directory
  ansible.builtin.file:
    path: "{{ openclaw_home }}/.config/systemd/user/openclaw-gateway.service.d"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0755'

- name: Deploy startup optimization environment
  ansible.builtin.copy:
    dest: "{{ openclaw_home }}/.config/systemd/user/openclaw-gateway.service.d/optimization.conf"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0644'
    content: |
      [Service]
      Environment=NODE_COMPILE_CACHE=/var/tmp/openclaw-compile-cache
      Environment=OPENCLAW_NO_RESPAWN=1
  notify:
    - Restart openclaw

- name: Ensure compile cache directory exists
  ansible.builtin.file:
    path: /var/tmp/openclaw-compile-cache
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0755'

- name: Deploy openclaw.json
  ansible.builtin.template:
    src: openclaw.json.j2
    dest: "{{ openclaw_home }}/.openclaw/openclaw.json"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0600'
  no_log: true
  notify:
    - Restart openclaw

- name: Ensure agent auth directory exists
  ansible.builtin.file:
    path: "{{ openclaw_home }}/.openclaw/agents/main/agent"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0700'

- name: Deploy Anthropic API key
  ansible.builtin.copy:
    content: |
      {
        "version": 1,
        "profiles": {
          "anthropic:default": {
            "type": "api_key",
            "provider": "anthropic",
            "key": "{{ anthropic_api_key }}"
          }
        }
      }
    dest: "{{ openclaw_home }}/.openclaw/agents/main/agent/auth-profiles.json"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0600'
  when: anthropic_api_key is defined
  no_log: true

- name: Run post-provision health check
  ansible.builtin.command:
    cmd: openclaw doctor --non-interactive
  become: true
  become_user: "{{ openclaw_user }}"
  environment:
    PATH: "{{ openclaw_home }}/.local/share/pnpm:{{ openclaw_home }}/.local/bin:/usr/local/bin:/usr/bin:/bin"
  changed_when: false
  register: provision_doctor
  failed_when: false

- name: Show post-provision doctor output
  ansible.builtin.debug:
    var: provision_doctor.stdout_lines
  when: provision_doctor.stdout_lines is defined
