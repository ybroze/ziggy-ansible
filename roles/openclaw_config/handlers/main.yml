---
- name: Look up openclaw user UID
  ansible.builtin.command:
    cmd: "id -u {{ openclaw_user }}"
  register: openclaw_uid_lookup
  changed_when: false
  listen: Restart openclaw

- name: Restart openclaw
  ansible.builtin.shell:
    cmd: systemctl --user restart openclaw-gateway
    executable: /bin/bash
  become: true
  become_user: "{{ openclaw_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ openclaw_uid_lookup.stdout }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ openclaw_uid_lookup.stdout }}/bus"
  listen: Restart openclaw
