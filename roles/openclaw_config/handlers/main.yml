---
- name: Restart openclaw
  ansible.builtin.shell:
    cmd: systemctl --user restart openclaw-gateway
    executable: /bin/bash
  become: true
  become_user: "{{ openclaw_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ openclaw_uid_value }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ openclaw_uid_value }}/bus"

- name: Run openclaw doctor
  ansible.builtin.command:
    cmd: openclaw doctor --non-interactive
  become: true
  become_user: "{{ openclaw_user }}"
  environment: "{{ openclaw_env }}"
  changed_when: false
  register: openclaw_doctor_result
  failed_when: false

- name: Show doctor output
  ansible.builtin.debug:
    var: openclaw_doctor_result.stdout_lines
  when: openclaw_doctor_result.stdout_lines is defined
