---
# Initialize and configure the agent workspace

- name: Create workspace directory
  ansible.builtin.file:
    path: "{{ agent_workspace }}"
    state: directory
    owner: "{{ agent_user }}"
    group: "{{ agent_user }}"
    mode: '0755'

- name: Check if workspace is a git repo
  ansible.builtin.stat:
    path: "{{ agent_workspace }}/.git"
  register: workspace_git

- name: Initialize workspace as git repo
  ansible.builtin.command:
    cmd: git init
    chdir: "{{ agent_workspace }}"
  become: true
  become_user: "{{ agent_user }}"
  when: not workspace_git.stat.exists

- name: Configure git origin
  ansible.builtin.command:
    cmd: "git remote add origin {{ workspace_git_origin }}"
    chdir: "{{ agent_workspace }}"
  become: true
  become_user: "{{ agent_user }}"
  register: git_remote_add
  changed_when: git_remote_add.rc == 0
  failed_when:
    - git_remote_add.rc != 0
    - "'already exists' not in git_remote_add.stderr"
  when: workspace_git_origin is defined and workspace_git_origin | length > 0

- name: Update git origin URL
  ansible.builtin.command:
    cmd: "git remote set-url origin {{ workspace_git_origin }}"
    chdir: "{{ agent_workspace }}"
  become: true
  become_user: "{{ agent_user }}"
  changed_when: false
  when:
    - workspace_git_origin is defined and workspace_git_origin | length > 0
    - git_remote_add is defined
    - "'already exists' in (git_remote_add.stderr | default(''))"

- name: Set workspace branch
  ansible.builtin.command:
    cmd: "git checkout -B {{ workspace_git_branch | default('master') }}"
    chdir: "{{ agent_workspace }}"
  become: true
  become_user: "{{ agent_user }}"
  changed_when: false
  when: workspace_git_origin is defined and workspace_git_origin | length > 0

- name: Ensure workspace memory directory exists
  ansible.builtin.file:
    path: "{{ agent_workspace }}/memory"
    state: directory
    owner: "{{ agent_user }}"
    group: "{{ agent_user }}"
    mode: '0755'
