---
# Ziggy-specific configuration layered on top of base OpenClaw

- name: Create Ziggy config directory
  ansible.builtin.file:
    path: "{{ openclaw_home }}/.config/ziggy"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0700'

- name: Deploy credential files
  ansible.builtin.copy:
    content: "{{ item.content }}"
    dest: "{{ item.dest }}"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "{{ item.mode | default('0600') }}"
  no_log: true
  when: item.when
  loop:
    - content: "{{ agent_ssh_private_key | default('') }}"
      dest: "{{ openclaw_home }}/.ssh/id_ed25519"
      when: "{{ agent_ssh_private_key is defined }}"
    - content: "{{ agent_ssh_public_key | default('') }}"
      dest: "{{ openclaw_home }}/.ssh/id_ed25519.pub"
      mode: '0644'
      when: "{{ agent_ssh_public_key is defined }}"
    - content: "{{ agent_github_pat | default('') }}"
      dest: "{{ openclaw_home }}/.config/ziggy/github-token.txt"
      when: "{{ agent_github_pat is defined }}"
    - content: "{{ agent_google_credentials | default({}) | to_nice_json }}"
      dest: "{{ openclaw_home }}/.config/ziggy/google-credentials.json"
      when: "{{ agent_google_credentials is defined }}"
    - content: "{{ agent_google_tokens | default({}) | to_nice_json }}"
      dest: "{{ openclaw_home }}/.config/ziggy/google-tokens.json"
      when: "{{ agent_google_tokens is defined }}"
  loop_control:
    label: "{{ item.dest }}"

- name: Configure SSH for GitHub
  ansible.builtin.copy:
    dest: "{{ openclaw_home }}/.ssh/config"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0600'
    content: |
      Host github.com
        IdentityFile ~/.ssh/id_ed25519
        StrictHostKeyChecking accept-new

- name: Deploy Twilio credentials
  ansible.builtin.template:
    src: twilio.env.j2
    dest: "{{ openclaw_home }}/.config/ziggy/twilio.env"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0600'
  when: twilio_sid is defined
  no_log: true

- name: Initialize SQLite state database
  ansible.builtin.command:
    cmd: sqlite3 {{ openclaw_home }}/.config/ziggy/memory.db ""
    creates: "{{ openclaw_home }}/.config/ziggy/memory.db"
  become: true
  become_user: "{{ openclaw_user }}"

- name: Apply database schema
  ansible.builtin.shell:
    cmd: sqlite3 {{ openclaw_home }}/.config/ziggy/memory.db < {{ playbook_dir }}/../schema.sql
    executable: /bin/bash
  become: true
  become_user: "{{ openclaw_user }}"
  changed_when: false

- name: Initialize workspace git remote
  ansible.builtin.shell:
    cmd: |
      cd {{ openclaw_home }}/.openclaw/workspace
      if ! git remote get-url origin >/dev/null 2>&1; then
        git init
        git remote add origin {{ workspace_git_remote }}
        echo "initialized"
      else
        echo "already configured"
      fi
    executable: /bin/bash
  become: true
  become_user: "{{ openclaw_user }}"
  register: git_init
  changed_when: "'initialized' in git_init.stdout"

- name: Configure git user for openclaw
  ansible.builtin.shell:
    cmd: |
      git config --global user.name \
        "{{ agent_git_name | default('OpenClaw Agent') }}"
      git config --global user.email \
        "{{ agent_git_email }}"
  become: true
  become_user: "{{ openclaw_user }}"
  changed_when: false
  when: agent_git_email is defined
