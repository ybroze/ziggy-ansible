---
# Ziggy-specific configuration layered on top of base OpenClaw

- name: Create Ziggy config directory
  ansible.builtin.file:
    path: "{{ openclaw_home }}/.config/ziggy"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0700'

- name: Create SSH directory for openclaw user
  ansible.builtin.file:
    path: "{{ openclaw_home }}/.ssh"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0700'

- name: Deploy SSH key for GitHub (if provided)
  ansible.builtin.copy:
    content: "{{ ziggy_ssh_private_key }}"
    dest: "{{ openclaw_home }}/.ssh/id_ed25519"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0600'
  when: ziggy_ssh_private_key is defined
  no_log: true

- name: Deploy SSH public key for GitHub (if provided)
  ansible.builtin.copy:
    content: "{{ ziggy_ssh_public_key }}"
    dest: "{{ openclaw_home }}/.ssh/id_ed25519.pub"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0644'
  when: ziggy_ssh_public_key is defined

- name: Configure SSH for GitHub
  ansible.builtin.copy:
    dest: "{{ openclaw_home }}/.ssh/config"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0600'
    content: |
      Host github.com
        IdentityFile ~/.ssh/id_ed25519
        StrictHostKeyChecking accept-new

- name: Deploy GitHub PAT
  ansible.builtin.copy:
    content: "{{ ziggy_github_pat }}"
    dest: "{{ openclaw_home }}/.config/ziggy/github-token.txt"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0600'
  when: ziggy_github_pat is defined
  no_log: true

- name: Deploy Twilio credentials
  ansible.builtin.template:
    src: twilio.env.j2
    dest: "{{ openclaw_home }}/.config/ziggy/twilio.env"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0600'
  when: twilio_sid is defined
  no_log: true

- name: Deploy Google OAuth credentials
  ansible.builtin.copy:
    content: "{{ ziggy_google_credentials | to_nice_json }}"
    dest: "{{ openclaw_home }}/.config/ziggy/google-credentials.json"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0600'
  when: ziggy_google_credentials is defined
  no_log: true

- name: Deploy Google OAuth tokens
  ansible.builtin.copy:
    content: "{{ ziggy_google_tokens | to_nice_json }}"
    dest: "{{ openclaw_home }}/.config/ziggy/google-tokens.json"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0600'
  when: ziggy_google_tokens is defined
  no_log: true

- name: Initialize workspace git remote
  ansible.builtin.shell:
    cmd: |
      cd {{ openclaw_home }}/.openclaw/workspace
      if ! git remote get-url origin >/dev/null 2>&1; then
        git init
        git remote add origin {{ workspace_git_remote }}
        echo "initialized"
      else
        echo "already configured"
      fi
    executable: /bin/bash
  become: true
  become_user: "{{ openclaw_user }}"
  register: git_init
  changed_when: "'initialized' in git_init.stdout"

- name: Configure git user for openclaw
  ansible.builtin.shell:
    cmd: |
      git config --global user.name "Ziggy"
      git config --global user.email "ziggy@broze.net"
  become: true
  become_user: "{{ openclaw_user }}"
  changed_when: false
