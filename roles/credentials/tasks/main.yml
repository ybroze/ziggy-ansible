---
# Deploy credentials, keys, and identity configuration

- name: Create agent config directory
  ansible.builtin.file:
    path: "{{ agent_home }}/.config/{{ agent_name }}"
    state: directory
    owner: "{{ agent_user }}"
    group: "{{ agent_user }}"
    mode: '0700'

- name: Generate SSH keypair for agent
  community.crypto.openssh_keypair:
    path: "{{ agent_home }}/.ssh/id_ed25519"
    type: ed25519
    owner: "{{ agent_user }}"
    group: "{{ agent_user }}"
  register: agent_ssh_keypair

- name: Display public key for GitHub authorization
  ansible.builtin.debug:
    msg: >-
      Add this public key to GitHub as a deploy key:
      {{ agent_ssh_keypair.public_key }}
  when: agent_ssh_keypair is changed

- name: Deploy GitHub PAT
  ansible.builtin.copy:
    content: "{{ agent_github_pat }}"
    dest: "{{ agent_home }}/.config/{{ agent_name }}/github-token.txt"
    owner: "{{ agent_user }}"
    group: "{{ agent_user }}"
    mode: '0600'
  no_log: true
  when: agent_github_pat is defined

- name: Configure SSH for GitHub
  ansible.builtin.copy:
    dest: "{{ agent_home }}/.ssh/config"
    owner: "{{ agent_user }}"
    group: "{{ agent_user }}"
    mode: '0600'
    content: |
      Host github.com
        IdentityFile ~/.ssh/id_ed25519
        StrictHostKeyChecking accept-new

- name: Deploy Twilio credentials
  ansible.builtin.template:
    src: twilio.env.j2
    dest: "{{ agent_home }}/.config/{{ agent_name }}/twilio.env"
    owner: "{{ agent_user }}"
    group: "{{ agent_user }}"
    mode: '0600'
  when: twilio_sid is defined
  no_log: true

- name: Deploy Google password
  ansible.builtin.copy:
    content: "{{ google_password }}"
    dest: "{{ agent_home }}/.config/{{ agent_name }}/google-password.txt"
    owner: "{{ agent_user }}"
    group: "{{ agent_user }}"
    mode: '0600'
  no_log: true
  when: google_password is defined and google_password | length > 0

- name: Install Google Workspace CLI
  ansible.builtin.shell:
    cmd: |
      if command -v gws >/dev/null 2>&1; then
        echo "already installed"
      else
        pnpm add -g @googleworkspace/cli
        echo "installed"
      fi
    executable: /bin/bash
  become: true
  become_user: "{{ agent_user }}"
  environment:
    PNPM_HOME: "{{ agent_home }}/.local/share/pnpm"
    PATH: "{{ agent_home }}/.local/bin:{{ agent_home }}/.local/share/pnpm:/usr/local/bin:/usr/bin:/bin"
  register: gws_install
  changed_when: "'installed' in gws_install.stdout"
  when: google_password is defined and google_password | length > 0

- name: Configure git user name
  community.general.git_config:
    name: user.name
    value: "{{ agent_git_name | default('Agent') }}"
    scope: global
  become: true
  become_user: "{{ agent_user }}"

- name: Configure git user email
  community.general.git_config:
    name: user.email
    value: "{{ agent_git_email }}"
    scope: global
  become: true
  become_user: "{{ agent_user }}"
  when: agent_git_email is defined
