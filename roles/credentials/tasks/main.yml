---
# Deploy credentials, keys, and identity configuration

- name: Create agent config directory
  ansible.builtin.file:
    path: "{{ agent_home }}/.config/{{ agent_name }}"
    state: directory
    owner: "{{ agent_user }}"
    group: "{{ agent_user }}"
    mode: '0700'

- name: Deploy credential files
  ansible.builtin.copy:
    content: "{{ item.content }}"
    dest: "{{ item.dest }}"
    owner: "{{ agent_user }}"
    group: "{{ agent_user }}"
    mode: "{{ item.mode | default('0600') }}"
  no_log: true
  when: item.when
  loop:
    - content: "{{ agent_ssh_private_key | default('') }}"
      dest: "{{ agent_home }}/.ssh/id_ed25519"
      when: "{{ agent_ssh_private_key is defined }}"
    - content: "{{ agent_ssh_public_key | default('') }}"
      dest: "{{ agent_home }}/.ssh/id_ed25519.pub"
      mode: '0644'
      when: "{{ agent_ssh_public_key is defined }}"
    - content: "{{ agent_github_pat | default('') }}"
      dest: "{{ agent_home }}/.config/{{ agent_name }}/github-token.txt"
      when: "{{ agent_github_pat is defined }}"
  loop_control:
    label: "{{ item.dest }}"

- name: Configure SSH for GitHub
  ansible.builtin.copy:
    dest: "{{ agent_home }}/.ssh/config"
    owner: "{{ agent_user }}"
    group: "{{ agent_user }}"
    mode: '0600'
    content: |
      Host github.com
        IdentityFile ~/.ssh/id_ed25519
        StrictHostKeyChecking accept-new

- name: Deploy Twilio credentials
  ansible.builtin.template:
    src: twilio.env.j2
    dest: "{{ agent_home }}/.config/{{ agent_name }}/twilio.env"
    owner: "{{ agent_user }}"
    group: "{{ agent_user }}"
    mode: '0600'
  when: twilio_sid is defined
  no_log: true

- name: Deploy Google password
  ansible.builtin.copy:
    content: "{{ google_password }}"
    dest: "{{ agent_home }}/.config/{{ agent_name }}/google-password.txt"
    owner: "{{ agent_user }}"
    group: "{{ agent_user }}"
    mode: '0600'
  no_log: true
  when: google_password is defined and google_password | length > 0

- name: Install Google Workspace CLI
  ansible.builtin.shell:
    cmd: |
      if command -v gws >/dev/null 2>&1; then
        echo "already installed"
      else
        pnpm add -g @googleworkspace/cli
        echo "installed"
      fi
    executable: /bin/bash
  become: true
  become_user: "{{ agent_user }}"
  register: gws_install
  changed_when: "'installed' in gws_install.stdout"

- name: Configure git identity
  community.general.git_config:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    scope: global
  become: true
  become_user: "{{ agent_user }}"
  loop:
    - { name: user.name, value: "{{ agent_git_name | default('Agent') }}" }
    - { name: user.email, value: "{{ agent_git_email }}" }
  loop_control:
    label: "{{ item.name }}"
  when: agent_git_email is defined
