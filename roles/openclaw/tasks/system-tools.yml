---
# System tools installation (Linux/apt-based)

- name: Install essential system tools
  ansible.builtin.apt:
    name:
      - vim
      - git
      - git-lfs
      - curl
      - wget
      - jq
      - tmux
      - tree
      - htop
      - unzip
      - rsync
      - build-essential
    state: present
    update_cache: true

- name: Configure git globally for openclaw user
  community.general.git_config:
    name: "{{ item.name }}"
    scope: global
    value: "{{ item.value }}"
  become: true
  become_user: "{{ openclaw_user }}"
  loop:
    - { name: 'init.defaultBranch', value: 'master' }
    - { name: 'pull.rebase', value: 'false' }
    - { name: 'core.editor', value: 'vim' }
    - { name: 'color.ui', value: 'auto' }
